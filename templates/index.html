<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum-Secure AI Code Analyzer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/static/style.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <h1 class="text-center mb-4">Quantum-Secure AI Code Analyzer</h1>
        <p class="text-center">Analyze your Python code for cryptographic vulnerabilities and convert to quantum-safe alternatives.</p>

        {% if error %}
        <div class="alert alert-danger">{{ error }}</div>
        {% endif %}

        <form action="/analyze_web" method="post" enctype="multipart/form-data" class="mt-4">
            <div class="mb-3">
                <label for="code" class="form-label">Enter Python Code:</label>
                <textarea class="form-control" id="code" name="code" rows="10" placeholder="Paste your Python code here..."></textarea>
            </div>
            <div class="mb-3">
                <label for="file" class="form-label">Or Upload a Python File:</label>
                <input type="file" class="form-control" id="file" name="file" accept=".py">
            </div>
            <div class="form-check mb-3">
                <input class="form-check-input" type="checkbox" id="llm_enabled" name="llm_enabled">
                <label class="form-check-label" for="llm_enabled">
                    Enable LLM Analysis (requires API key)
                </label>
            </div>
            <div class="form-check mb-3">
                <input class="form-check-input" type="checkbox" id="use_local" name="use_local">
                <label class="form-check-label" for="use_local">
                    Use Local LLM
                </label>
            </div>
            <button type="submit" class="btn btn-primary">Analyze Code</button>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/script.js"></script>
</body>
</html>
